openapi: 3.0.3
info:
  title: ContestSaaS API
  version: 1.0.0
  description: |
    API REST de ContestSaaS. Todos los endpoints autenticados requieren el JWT de Supabase como Bearer token.

    **Obtener token:** En la app, abre la consola del navegador y ejecuta:
    ```js
    const { data } = await supabase.auth.getSession()
    console.log(data.session.access_token)
    ```
servers:
  - url: http://localhost:3000
    description: Local dev
  - url: https://TU_DOMINIO.com
    description: Production
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT (Supabase session access_token)

  schemas:
    Error:
      type: object
      properties:
        statusCode: { type: integer }
        statusMessage: { type: string }
        data: { type: array, items: { type: object } }

    Contest:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, nullable: true }
        status:
          type: string
          enum: [draft, active, finished, cancelled]
        is_rounds_dynamic: { type: boolean }
        starts_at: { type: string, nullable: true }
        ends_at: { type: string, nullable: true }
        entry_fee_cents: { type: integer, nullable: true }
        registration_open: { type: boolean }
        cover_image_url: { type: string, nullable: true }
        rules: { type: string, nullable: true }
        organization_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        contest_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        order: { type: integer }
        status: { type: string }
        min_age: { type: integer, nullable: true }
        max_age: { type: integer, nullable: true }
        artistic_type: { type: string, nullable: true }
        speciality: { type: string, nullable: true }
        max_participants: { type: integer, nullable: true }

    Round:
      type: object
      properties:
        id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        name: { type: string }
        order: { type: integer }
        status: { type: string, enum: [pending, open, closed] }
        is_final: { type: boolean }

    Participant:
      type: object
      properties:
        id: { type: string, format: uuid }
        contest_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid, nullable: true }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        name: { type: string, nullable: true }
        birthdate: { type: string, format: date, nullable: true }
        dni: { type: string, nullable: true }
        country: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        status: { type: string }
        payment_status:
          type: string
          enum: [free, pending, paid, refunded, partial_refund]
        created_at: { type: string, format: date-time }

    Score:
      type: object
      properties:
        id: { type: string, format: uuid }
        round_id: { type: string, format: uuid }
        participant_id: { type: string, format: uuid }
        judge_id: { type: string, format: uuid }
        value: { type: number }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ContestMember:
      type: object
      properties:
        id: { type: string, format: uuid }
        contest_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, nullable: true }
        full_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        role: { type: string, enum: [judge, viewer, staff] }

    # ── Request bodies ────────────────────────────────────────────────────────

    ContestCreateBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        short_description: { type: string, maxLength: 2000, nullable: true }
        prizes: { type: string, maxLength: 5000, nullable: true }
        rules: { type: string, maxLength: 10000, nullable: true }
        starts_at: { type: string, nullable: true }
        ends_at: { type: string, nullable: true }
        is_rounds_dynamic: { type: boolean, default: false }
        mode: { type: string, enum: [standard, tournament], default: standard }

    ContestPatchBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 5000, nullable: true }
        type: { type: string, maxLength: 50 }
        status: { type: string, enum: [draft, active, finished, cancelled] }
        is_rounds_dynamic: { type: boolean }
        starts_at: { type: string, nullable: true }
        ends_at: { type: string, nullable: true }
        settings: { type: object, nullable: true }
        cover_image_url: { type: string, nullable: true }
        rules: { type: string, maxLength: 10000, nullable: true }
        entry_fee_cents: { type: integer, minimum: 0, nullable: true }
        registration_open: { type: boolean }

    CategoryPatchBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000, nullable: true }
        order: { type: integer, minimum: 0 }
        status: { type: string, maxLength: 50 }
        min_age: { type: integer, minimum: 0, nullable: true }
        max_age: { type: integer, minimum: 0, nullable: true }
        artistic_type: { type: string, maxLength: 100, nullable: true }
        speciality: { type: string, maxLength: 100, nullable: true }
        max_participants: { type: integer, minimum: 1, nullable: true }

    ParticipantCreateBody:
      type: object
      required: [category_id]
      properties:
        category_id: { type: string, format: uuid }
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        birthdate: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$', example: '2000-01-15' }
        dni: { type: string, minLength: 8, maxLength: 20, nullable: true }
        country: { type: string, minLength: 2, maxLength: 100, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, pattern: '^\+\d{7,15}$', nullable: true, example: '+34600112233' }

    ParticipantPatchBody:
      type: object
      properties:
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        birthdate: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        dni: { type: string, minLength: 8, maxLength: 20, nullable: true }
        country: { type: string, minLength: 2, maxLength: 100, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, pattern: '^\+\d{7,15}$', nullable: true }
        metadata: { type: object, nullable: true }
        status: { type: string, maxLength: 50 }

    ImportRow:
      type: object
      required: [category_id, first_name, last_name, birthdate]
      properties:
        category_id: { type: string, format: uuid }
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        birthdate: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        dni: { type: string, nullable: true }
        country: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }

    ScoreBody:
      type: object
      required: [round_id, participant_id, judge_id, value]
      properties:
        round_id: { type: string, format: uuid }
        participant_id: { type: string, format: uuid }
        judge_id: { type: string, format: uuid }
        value: { type: number }
        notes: { type: string, maxLength: 1000, nullable: true }
        promote: { type: boolean, default: false }

    ContestMemberBody:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string, minLength: 1, maxLength: 200 }
        role: { type: string, enum: [judge, viewer, staff] }

    EnrollBody:
      type: object
      required: [category_id, first_name, last_name, birthdate]
      properties:
        category_id: { type: string, format: uuid }
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        birthdate: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$', example: '2000-01-15' }
        dni: { type: string, minLength: 8, maxLength: 20, nullable: true }
        country: { type: string, minLength: 2, maxLength: 100, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, pattern: '^\+\d{7,15}$', nullable: true }

tags:
  - name: Health
  - name: Auth
  - name: Contests
  - name: Categories
  - name: Rounds
  - name: Participants
  - name: Scores
  - name: Members
  - name: Billing
  - name: Public
  - name: Stats
  - name: Calendar

paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /api/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # ── Auth ────────────────────────────────────────────────────────────────────

  /api/auth/welcome:
    post:
      tags: [Auth]
      summary: Enviar email de bienvenida tras registro
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email: { type: string, format: email }
                name: { type: string }
      responses:
        '200':
          description: Email enviado
        '429':
          description: Rate limit (20/min)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── Contests ────────────────────────────────────────────────────────────────

  /api/contests:
    get:
      tags: [Contests]
      summary: Listar concursos de la organización
      responses:
        '200':
          description: Lista de concursos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Contest' }
        '401':
          description: No autenticado
    post:
      tags: [Contests]
      summary: Crear nuevo concurso
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContestCreateBody' }
      responses:
        '200':
          description: Concurso creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contest' }
        '400':
          description: Validación Zod fallida
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/contests/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: UUID o slug del concurso
    get:
      tags: [Contests]
      summary: Obtener concurso por ID o slug
      responses:
        '200':
          description: Concurso
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contest' }
        '404':
          description: No encontrado
    patch:
      tags: [Contests]
      summary: Actualizar concurso
      description: |
        Campos opcionales. Reglas:
        - `active → draft` está prohibido (409)
        - Activar con `status: active` consume 1 activación del balance
        - `entry_fee_cents > 0` requiere Stripe onboarding completado
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContestPatchBody' }
      responses:
        '200':
          description: Concurso actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contest' }
        '402':
          description: Sin activaciones disponibles
        '409':
          description: Transición de estado no permitida
    delete:
      tags: [Contests]
      summary: Eliminar concurso
      responses:
        '200':
          description: Eliminado

  # ── Categories ──────────────────────────────────────────────────────────────

  /api/contests/{contestId}/categories:
    parameters:
      - name: contestId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Categories]
      summary: Listar categorías del concurso
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }
    post:
      tags: [Categories]
      summary: Crear categoría
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                description: { type: string, nullable: true }
                order: { type: integer, minimum: 0 }
                min_age: { type: integer, nullable: true }
                max_age: { type: integer, nullable: true }
                artistic_type: { type: string, nullable: true }
                speciality: { type: string, nullable: true }
                max_participants: { type: integer, nullable: true }
      responses:
        '200':
          description: Categoría creada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }

  /api/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Categories]
      summary: Actualizar categoría
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryPatchBody' }
      responses:
        '200':
          description: Categoría actualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400':
          description: Sin campos válidos o validación fallida
    delete:
      tags: [Categories]
      summary: Eliminar categoría
      responses:
        '200':
          description: Eliminada

  # ── Rounds ──────────────────────────────────────────────────────────────────

  /api/contests/{contestId}/rounds:
    parameters:
      - name: contestId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Rounds]
      summary: Listar rondas del concurso
      responses:
        '200':
          description: Lista de rondas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Round' }
    post:
      tags: [Rounds]
      summary: Crear ronda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, name]
              properties:
                category_id: { type: string, format: uuid }
                name: { type: string, minLength: 1, maxLength: 200 }
                is_final: { type: boolean, default: false }
      responses:
        '200':
          description: Ronda creada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Round' }

  /api/rounds/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Rounds]
      summary: Actualizar ronda (abrir/cerrar/renombrar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                status: { type: string, enum: [pending, open, closed] }
                is_final: { type: boolean }
      responses:
        '200':
          description: Ronda actualizada
        '409':
          description: Ronda cerrada — no se puede editar

  # ── Participants ─────────────────────────────────────────────────────────────

  /api/contests/{contestId}/participants:
    parameters:
      - name: contestId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Participants]
      summary: Listar participantes del concurso
      responses:
        '200':
          description: Lista de participantes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Participant' }
    post:
      tags: [Participants]
      summary: Inscribir participante manualmente (org/staff)
      description: Consume 1 ticket del balance. No disponible si el concurso está activo.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParticipantCreateBody' }
      responses:
        '200':
          description: Participante inscrito
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '402':
          description: Sin tickets disponibles

  /api/contests/{contestId}/participants/import:
    parameters:
      - name: contestId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Participants]
      summary: Importar participantes en bulk (CSV)
      description: Consume 1 ticket por fila. Máximo 1000 filas. Llama a la RPC `bulk_enroll_csv`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rows]
              properties:
                rows:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items: { $ref: '#/components/schemas/ImportRow' }
      responses:
        '200':
          description: Importación completada
        '402':
          description: Sin tickets disponibles
        '409':
          description: Algún participante ya inscrito en la categoría

  /api/participants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Participants]
      summary: Obtener participante
      responses:
        '200':
          description: Participante
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
    patch:
      tags: [Participants]
      summary: Actualizar datos del participante
      description: No disponible si el concurso está activo/terminado/cancelado.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParticipantPatchBody' }
      responses:
        '200':
          description: Participante actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '409':
          description: Concurso en curso — edición bloqueada
    delete:
      tags: [Participants]
      summary: Eliminar participante
      responses:
        '200':
          description: Eliminado

  # ── Scores ───────────────────────────────────────────────────────────────────

  /api/scores:
    get:
      tags: [Scores]
      summary: Obtener puntuaciones
      parameters:
        - name: round_id
          in: query
          schema: { type: string, format: uuid }
        - name: participant_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lista de puntuaciones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Score' }
    post:
      tags: [Scores]
      summary: Registrar puntuación (jurado)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScoreBody' }
      responses:
        '200':
          description: Puntuación registrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Score' }
        '400':
          description: Validación fallida (campos required)

  # ── Members ──────────────────────────────────────────────────────────────────

  /api/contests/{contestId}/members:
    parameters:
      - name: contestId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Members]
      summary: Listar miembros del concurso (jurados, staff)
      responses:
        '200':
          description: Lista de miembros
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ContestMember' }
    post:
      tags: [Members]
      summary: Añadir miembro al concurso
      description: Si se pasa `email` sin `user_id`, se busca el usuario en Supabase Auth.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContestMemberBody' }
      responses:
        '200':
          description: Miembro añadido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContestMember' }
        '409':
          description: El usuario ya está inscrito como participante

  # ── Billing ──────────────────────────────────────────────────────────────────

  /api/billing/balance:
    get:
      tags: [Billing]
      summary: Consultar balance de la organización (tickets + activaciones)
      responses:
        '200':
          description: Balance actual
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_balance: { type: integer }
                  activation_balance: { type: integer }

  /api/billing/checkout:
    post:
      tags: [Billing]
      summary: Iniciar Stripe Checkout para un bundle (Starter/Pro/Enterprise)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan: { type: string, enum: [starter, pro, enterprise] }
      responses:
        '200':
          description: URL de Stripe Checkout
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  /api/billing/checkout-tickets:
    post:
      tags: [Billing]
      summary: Comprar tickets individuales (€1/ud, máx 500)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1, maximum: 500 }
                return_path: { type: string, description: 'Ruta interna para redirigir tras el pago' }
      responses:
        '200':
          description: URL de Stripe Checkout
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  /api/billing/checkout-activations:
    post:
      tags: [Billing]
      summary: Comprar activaciones individuales (€50/ud, máx 50)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1, maximum: 50 }
                return_path: { type: string }
      responses:
        '200':
          description: URL de Stripe Checkout
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  # ── Public ───────────────────────────────────────────────────────────────────

  /api/public/contests/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Public]
      summary: Ver concurso público por slug (sin auth)
      security: []
      responses:
        '200':
          description: Datos públicos del concurso
        '404':
          description: No encontrado

  /api/public/inscriptions/{token}/enroll:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Token de inscripción asociado al concurso
    post:
      tags: [Public]
      summary: Inscribir participante vía formulario público (consume ticket)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnrollBody' }
      responses:
        '200':
          description: Inscripción completada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '400':
          description: Validación fallida
        '402':
          description: Sin tickets disponibles
        '409':
          description: Ya inscrito en esta categoría

  # ── Stats ────────────────────────────────────────────────────────────────────

  /api/stats/organization:
    get:
      tags: [Stats]
      summary: Estadísticas globales de la organización
      responses:
        '200':
          description: Métricas de la organización
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_contests: { type: integer }
                  active_contests: { type: integer }
                  total_participants: { type: integer }
                  ticket_balance: { type: integer }
                  activation_balance: { type: integer }

  # ── Calendar ─────────────────────────────────────────────────────────────────

  /api/calendar:
    get:
      tags: [Calendar]
      summary: Eventos del calendario (ensayos, actuaciones)
      responses:
        '200':
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    title: { type: string }
                    start: { type: string, format: date-time }
                    end: { type: string, format: date-time }
                    type: { type: string, enum: [rehearsal, performance] }
